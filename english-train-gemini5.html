<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="えいけん5きゅう">
  <meta name="theme-color" content="#FFF0F5">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="manifest" href="manifest.json">
  <title>英検5級 英語トレーニング</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #FF8A80;
      --bg-color: #FFF0F5;
      --train-color: #FFF59D;
      --track-border: #80DEEA;
      --success: #4DB6AC;
      --error: #FF5252;
      --text-color: #5D4037;
    }

    body {
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
      text-align: center;
      background-color: var(--bg-color);
      background-image: radial-gradient(#FFCDD2 15%, transparent 16%), radial-gradient(#FFCDD2 15%, transparent 16%);
      background-size: 40px 40px;
      background-position: 0 0, 20px 20px;
      margin: 0;
      padding: 10px 15px 30px;
      color: var(--text-color);
      touch-action: manipulation;
    }

    /* ─── 共通ナビ（3ページ共通） ─── */
    .otowa-nav {
      display: flex;
      gap: 6px;
      justify-content: center;
      max-width: 600px;
      margin: 0 auto 10px;
      padding: 6px;
      background: rgba(255,255,255,0.9);
      border: 2px solid #FFCDD2;
      border-radius: 16px;
      box-shadow: 0 3px 0 #FFCDD2;
    }
    .otowa-nav a, .otowa-nav .here {
      flex: 1;
      text-align: center;
      padding: 8px 6px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 12px;
      text-decoration: none;
      font-family: 'Zen Maru Gothic', sans-serif;
      touch-action: manipulation;
    }
    .otowa-nav a { background: #FFF0F5; color: #AD1457; border: 2px solid #FFCDD2; }
    .otowa-nav a:active { background: var(--primary-color); color: #fff; }
    .otowa-nav .here { background: var(--success); color: #fff; border: 2px solid var(--success); cursor: default; }

    /* ─── タブバー ─── */
    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .tab-btn {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 16px;
      border: 3px solid #FFCDD2;
      border-radius: 20px;
      background-color: #fff;
      color: var(--text-color);
      cursor: pointer;
      box-shadow: 0 4px 0 #FFCDD2;
      transition: all 0.1s ease;
    }

    .tab-btn.active {
      background-color: var(--primary-color);
      color: white;
      border-color: #FF5252;
      box-shadow: 0 4px 0 #FF5252;
    }

    .tab-btn:active { transform: translateY(4px); box-shadow: none; }

    /* ─── 共通コンテナ ─── */
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255,255,255,0.95);
      padding: 25px 20px;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(255,138,128,0.2);
      border: 3px solid #FFCDD2;
      position: relative;
    }

    h1 { color: var(--primary-color); font-size: 26px; margin-bottom: 5px; text-shadow: 2px 2px 0px #FFE0B2; }

    ruby { ruby-align: center; }
    rt { font-size: 12px; color: #8D6E63; }

    .animal-icon { animation: bounce 2s infinite ease-in-out; display: block; margin: 10px auto; filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.1)); }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ─── 共通ボタン ─── */
    button.action {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 20px;
      font-weight: 700;
      padding: 14px 30px;
      color: white;
      border: none;
      border-radius: 28px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15);
      cursor: pointer;
      transition: all 0.1s ease;
    }
    button.action:active { transform: translateY(6px); box-shadow: none; }

    /* ─── セット進捗 ─── */
    .set-progress { font-size: 16px; font-weight: 700; color: #8D6E63; margin: 4px 0; }
    .set-progress-bar { width: 100%; height: 10px; background: #FFCDD2; border-radius: 5px; margin: 4px 0 8px; overflow: hidden; }
    .set-progress-fill { height: 100%; background: linear-gradient(90deg, #FF8A80, #4DB6AC); border-radius: 5px; transition: width 0.3s; }

    /* ─── 解説ボックス ─── */
    .explanation-box { background: #FFF8E1; border: 2px solid #FFD54F; border-radius: 16px; padding: 12px 16px; margin: 8px 0; font-size: 16px; line-height: 1.6; color: #5D4037; animation: fadeIn 0.4s ease; display: none; }
    .explanation-box.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── 正解タップ促し ─── */
    .choice-btn.glow { animation: glowPulse 0.8s infinite alternate; }
    @keyframes glowPulse { from { box-shadow: 0 5px 0 #388E3C, 0 0 8px rgba(76,175,80,0.4); } to { box-shadow: 0 5px 0 #388E3C, 0 0 20px rgba(76,175,80,0.8); } }
    .tap-prompt { font-size: 17px; font-weight: 700; color: var(--success); margin-top: 4px; animation: fadeIn 0.4s ease; }

    /* ─── セットクリア演出 ─── */
    .set-complete { display: none; text-align: center; padding: 20px; }
    .set-complete.show { display: block; }
    .set-complete h2 { font-size: 28px; color: var(--primary-color); margin: 10px 0; }
    .set-complete .score-display { font-size: 22px; font-weight: 700; color: var(--success); margin: 10px 0; }
    .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
    .confetti { position: absolute; width: 10px; height: 10px; top: -10px; animation: confettiFall 3s ease-in forwards; }
    @keyframes confettiFall { to { top: 110vh; transform: rotate(720deg); } }

    .controls { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 20px; }

    .check-btn { background-color: #66BB6A; box-shadow: 0 6px 0 #43A047; border: 2px solid #81C784; }
    .reset-btn { background-color: #FF8A65; box-shadow: 0 6px 0 #F4511E; border: 2px solid #FFAB91; }
    .next-btn  { background-color: #4FC3F7; box-shadow: 0 6px 0 #039BE5; border: 2px solid #81D4FA; display: none; }

    /* ─── 大問3（電車パズル）スタイル ─── */
    .question-box {
      background-color: #E0F7FA;
      padding: 15px 25px;
      border-radius: 20px;
      font-size: 20px;
      font-weight: 700;
      margin: 15px auto 20px;
      color: #0097A7;
      border: 3px dashed #B2EBF2;
      display: inline-block;
      min-width: 60%;
    }

    #train-track {
      min-height: 80px;
      border: 5px dashed var(--track-border);
      background-color: #FAFAFA;
      border-radius: 20px;
      margin: 15px auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
      padding: 15px;
      transition: background-color 0.3s;
      box-shadow: inset 0 3px 10px rgba(0,0,0,0.05);
    }

    .word-btn {
      font-size: 22px;
      font-weight: 700;
      padding: 12px 20px;
      border: 3px solid #FFD54F;
      border-radius: 13px;
      background-color: var(--train-color);
      color: var(--text-color);
      cursor: pointer;
      box-shadow: 0 5px 0 #FFC107, 0 8px 8px rgba(0,0,0,0.1);
      transition: all 0.1s ease;
      user-select: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .word-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #FFC107; }
    .word-btn.hidden { visibility: hidden; }

    #words-pool { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin: 20px 0; min-height: 70px; }

    #message { font-size: 22px; font-weight: 700; margin-top: 15px; min-height: 45px; line-height: 1.4; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); }

    /* ─── 単語フラッシュカード ─── */
    .vocab-progress { font-size: 15px; color: #9E9E9E; margin-bottom: 8px; }
    .vocab-progress-bar { width: 100%; max-width: 400px; height: 10px; background-color: #E0E0E0; border-radius: 5px; margin: 6px auto 18px; overflow: hidden; }
    .vocab-progress-fill { height: 100%; background: linear-gradient(90deg, #CE93D8, #6A1B9A); border-radius: 5px; transition: width 0.4s ease; }

    .vocab-card {
      background: linear-gradient(135deg, #EDE7F6, #F3E5F5);
      border: 3px solid #CE93D8;
      border-radius: 25px;
      padding: 30px 20px;
      margin: 5px auto 18px;
      max-width: 500px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 7px 0 #AB47BC;
    }

    .vocab-english { font-size: 46px; font-weight: 700; color: #4A148C; margin-bottom: 10px; }
    .vocab-japanese { font-size: 22px; color: #6A1B9A; margin-bottom: 8px; display: none; }
    .vocab-example { font-size: 15px; color: #7B1FA2; font-style: italic; display: none; margin-top: 4px; }

    .vocab-controls { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 10px; }

    .btn-reveal {
      font-family: 'Zen Maru Gothic', sans-serif; font-size: 19px; font-weight: 700;
      padding: 13px 28px; background-color: #AB47BC; color: white; border: none;
      border-radius: 24px; box-shadow: 0 5px 0 #6A1B9A; cursor: pointer; transition: all 0.1s ease;
    }
    .btn-reveal:active { transform: translateY(5px); box-shadow: none; }

    .btn-ok {
      font-family: 'Zen Maru Gothic', sans-serif; font-size: 19px; font-weight: 700;
      padding: 13px 24px; background-color: #66BB6A; color: white; border: none;
      border-radius: 24px; box-shadow: 0 5px 0 #388E3C; cursor: pointer; transition: all 0.1s ease; display: none;
    }
    .btn-ok:active { transform: translateY(5px); box-shadow: none; }

    .btn-retry {
      font-family: 'Zen Maru Gothic', sans-serif; font-size: 19px; font-weight: 700;
      padding: 13px 24px; background-color: #FF8A65; color: white; border: none;
      border-radius: 24px; box-shadow: 0 5px 0 #E64A19; cursor: pointer; transition: all 0.1s ease; display: none;
    }
    .btn-retry:active { transform: translateY(5px); box-shadow: none; }

    .btn-speak {
      font-family: 'Zen Maru Gothic', sans-serif; font-size: 19px; font-weight: 700;
      padding: 13px 24px; background-color: #4FC3F7; color: white; border: none;
      border-radius: 24px; box-shadow: 0 5px 0 #0288D1; cursor: pointer; transition: all 0.1s ease; display: none;
    }
    .btn-speak:active { transform: translateY(5px); box-shadow: none; }

    .vocab-done-msg { font-size: 20px; font-weight: 700; margin: 10px 0; min-height: 30px; }

    /* ─── 単語 全体進捗 ─── */
    .vocab-global-progress { font-size: 16px; font-weight: 700; color: #2E7D32; margin-bottom: 4px; }
    .vocab-global-bar { width: 100%; max-width: 400px; height: 12px; background-color: #E0E0E0; border-radius: 6px; margin: 4px auto 12px; overflow: hidden; }
    .vocab-global-fill { height: 100%; background: linear-gradient(90deg, #66BB6A, #2E7D32); border-radius: 6px; transition: width 0.4s ease; }

    .vocab-mode-btns { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .btn-mode {
      font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 700;
      padding: 8px 18px; border: 2px solid #CE93D8; border-radius: 20px;
      background-color: #fff; color: #6A1B9A; cursor: pointer; transition: all 0.1s ease;
    }
    .btn-mode.active { background-color: #AB47BC; color: #fff; border-color: #6A1B9A; }
    .btn-mode:active { transform: translateY(2px); }
    .btn-reset {
      font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700;
      padding: 6px 14px; border: 2px solid #BDBDBD; border-radius: 16px;
      background-color: #fff; color: #9E9E9E; cursor: pointer;
    }
    .btn-reset:hover { color: #F44336; border-color: #F44336; }
    .vocab-session-end {
      background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
      border: 3px solid #81C784; border-radius: 25px;
      padding: 30px 20px; margin: 10px auto; max-width: 500px;
    }
    .vocab-session-end h2 { color: #2E7D32; font-size: 24px; margin: 0 0 8px; }
    .vocab-session-end p { color: #388E3C; font-size: 16px; margin: 0 0 16px; }
    .btn-next-session {
      font-family: 'Zen Maru Gothic', sans-serif; font-size: 19px; font-weight: 700;
      padding: 13px 28px; background-color: #66BB6A; color: white; border: none;
      border-radius: 24px; box-shadow: 0 5px 0 #388E3C; cursor: pointer;
    }
    .btn-next-session:active { transform: translateY(5px); box-shadow: none; }

    /* ─── 大問1・大問2（4択）スタイル ─── */
    .q-hint-box {
      background-color: #E0F7FA; padding: 12px 20px; border-radius: 18px;
      font-size: 17px; font-weight: 700; margin: 8px auto 12px;
      color: #0097A7; border: 3px dashed #B2EBF2; display: inline-block; min-width: 55%;
    }

    .q-sentence-box {
      background-color: #FFF9C4; padding: 18px 22px; border-radius: 18px;
      font-size: 20px; font-weight: 700; margin: 8px auto 16px;
      color: #5D4037; border: 3px solid #FFE082; max-width: 90%;
    }

    .q-blank {
      display: inline-block; min-width: 80px;
      border-bottom: 4px solid #FF8A80; color: #FF8A80; padding: 0 5px;
    }

    .dialogue-box {
      background-color: #F3E5F5; padding: 18px 22px; border-radius: 18px;
      font-size: 19px; font-weight: 700; margin: 8px auto 16px;
      color: #4A148C; border: 3px solid #CE93D8; max-width: 90%; text-align: left;
    }

    .dialogue-a { margin-bottom: 12px; color: #1565C0; }
    .dialogue-b { color: #880E4F; }

    .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 580px; margin: 0 auto 15px; }

    .choice-btn {
      font-family: 'Zen Maru Gothic', sans-serif; font-size: 17px; font-weight: 700;
      padding: 15px 10px; border: 3px solid #B2EBF2; border-radius: 14px;
      background-color: #E0F7FA; color: #006064;
      cursor: pointer; box-shadow: 0 5px 0 #80DEEA; transition: all 0.1s ease;
    }
    .choice-btn:active { transform: translateY(5px); box-shadow: none; }
    .choice-btn.correct { background-color: #C8E6C9; border-color: #4CAF50; box-shadow: 0 5px 0 #388E3C; color: #1B5E20; }
    .choice-btn.wrong   { background-color: #FFCDD2; border-color: #F44336; box-shadow: 0 5px 0 #C62828; color: #B71C1C; }
    .choice-btn:disabled { cursor: default; }
    .choice-meaning { display: block; font-size: 12px; color: #888; margin-top: 2px; }

    .q-message { font-size: 21px; font-weight: 700; min-height: 36px; margin: 10px 0; }

    .q-next-btn {
      font-family: 'Zen Maru Gothic', sans-serif; font-size: 20px; font-weight: 700;
      padding: 14px 32px; background-color: #4FC3F7; color: white; border: none;
      border-radius: 28px; box-shadow: 0 6px 0 #039BE5; cursor: pointer;
      transition: all 0.1s ease; display: none; margin-top: 8px;
    }
    .q-next-btn:active { transform: translateY(6px); box-shadow: none; }

    .q-score { font-size: 14px; color: #9E9E9E; margin-bottom: 10px; }

    /* ─── データ操作バー ─── */
    .data-bar {
      text-align: right; margin-bottom: 8px; max-width: 800px;
      margin-left: auto; margin-right: auto;
    }
  </style>
</head>
<body>

  <!-- 共通ナビ -->
  <nav class="otowa-nav">
    <a href="today.html">🏠 きょう</a>
    <span class="here">📖 トレイン</span>
    <a href="collection.html">🗂️ ずかん</a>
  </nav>

  <!-- タブバー -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('vocab')">📖 <ruby>単語<rt>たんご</rt></ruby></button>
    <button class="tab-btn" onclick="switchTab('q1')">🔲 <ruby>大問<rt>だいもん</rt></ruby>1</button>
    <button class="tab-btn" onclick="switchTab('q2')">💬 <ruby>大問<rt>だいもん</rt></ruby>2</button>
    <button class="tab-btn" onclick="switchTab('q3')">🚂 <ruby>大問<rt>だいもん</rt></ruby>3</button>
  </div>

  <!-- データ操作バー -->
  <div class="data-bar">
    <button class="btn-reset" onclick="exportAnswerLog()" style="font-size:12px;">📊 データをダウンロード</button>
    <button class="btn-reset" onclick="resetAnswerLog()" style="font-size:11px;margin-left:4px;">🗑️ データリセット</button>
  </div>

  <!-- ════════════════════════════════════════
       単語フラッシュカードモード
  ════════════════════════════════════════ -->
  <div id="mode-vocab" class="container">
    <h1>📖 <ruby>単語<rt>たんご</rt></ruby>フラッシュカード</h1>

    <!-- 全体進捗 -->
    <div class="vocab-global-progress" id="vocab-global-text"></div>
    <div class="vocab-global-bar"><div class="vocab-global-fill" id="vocab-global-fill" style="width:0%"></div></div>

    <!-- モード切替 -->
    <div class="vocab-mode-btns">
      <button class="btn-mode active" id="btn-mode-normal" onclick="setVocabMode('normal')">📚 まだ<ruby>覚<rt>おぼ</rt></ruby>えてない<ruby>単語<rt>たんご</rt></ruby></button>
      <button class="btn-mode" id="btn-mode-review" onclick="setVocabMode('review')">🌟 <ruby>覚<rt>おぼ</rt></ruby>えた<ruby>単語<rt>たんご</rt></ruby>を<ruby>復習<rt>ふくしゅう</rt></ruby></button>
    </div>

    <!-- セッション進捗 -->
    <div class="vocab-progress" id="vocab-progress-text"></div>
    <div class="vocab-progress-bar"><div class="vocab-progress-fill" id="vocab-progress-fill" style="width:0%"></div></div>

    <!-- カードエリア -->
    <div id="vocab-card-area">
      <div class="vocab-card">
        <div class="vocab-english" id="vocab-english"></div>
        <div class="vocab-japanese" id="vocab-japanese"></div>
        <div class="vocab-example" id="vocab-example"></div>
      </div>
      <div class="vocab-done-msg" id="vocab-done-msg"></div>
      <div class="vocab-controls">
        <button class="btn-speak" id="btn-speak" onclick="speakVocab()">🔊 <ruby>発音<rt>はつおん</rt></ruby></button>
        <button class="btn-reveal" id="btn-reveal" onclick="revealVocab()">👀 <ruby>答<rt>こた</rt></ruby>えを<ruby>見<rt>み</rt></ruby>る</button>
        <button class="btn-ok" id="btn-ok" onclick="vocabResult(true)">⭕ おぼえた！</button>
        <button class="btn-retry" id="btn-retry" onclick="vocabResult(false)">❌ もう<ruby>一度<rt>いちど</rt></ruby></button>
      </div>
    </div>

    <!-- セッション完了パネル -->
    <div id="vocab-session-end" style="display:none" class="vocab-session-end">
      <h2 id="vocab-session-end-title"></h2>
      <p id="vocab-session-end-msg"></p>
      <button class="btn-next-session" id="btn-next-session" onclick="startNextSession()" style="display:none"></button>
    </div>

    <!-- リセット -->
    <div style="margin-top: 16px;">
      <button class="btn-reset" onclick="resetVocabProgress()">🔄 <ruby>最初<rt>さいしょ</rt></ruby>からやり<ruby>直<rt>なお</rt></ruby>す</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       大問1：語句空所補充
  ════════════════════════════════════════ -->
  <div id="mode-q1" class="container" style="display:none">
    <h1>🔲 <ruby>大問<rt>だいもん</rt></ruby>1：<ruby>語句<rt>ごく</rt></ruby><ruby>空所<rt>くうしょ</rt></ruby><ruby>補充<rt>ほじゅう</rt></ruby></h1>
    <p>（　）に<ruby>入<rt>はい</rt></ruby>る<ruby>言葉<rt>ことば</rt></ruby>を4つから<ruby>選<rt>えら</rt></ruby>ぼう！</p>
    <div class="set-progress" id="q1-progress"></div>
    <div class="set-progress-bar"><div class="set-progress-fill" id="q1-progress-fill"></div></div>
    <div id="q1-quiz-area">
      <div class="q-score" id="q1-score"></div>
      <div class="q-hint-box" id="q1-hint"></div>
      <div class="q-sentence-box" id="q1-sentence"></div>
      <div class="choices-grid" id="q1-choices"></div>
      <div class="q-message" id="q1-message"></div>
      <div class="explanation-box" id="q1-explanation"></div>

  <script>
    // ══════════════════════════════════════════════
    //  単語ずかん ヘルパー（共通）
    // ══════════════════════════════════════════════
    window.otowaCollection = (function() {
      const KEY = 'otowa_word_collection';
      function load() { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { return {}; } }
      function save(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e) {} }
      function norm(en) { return String(en || '').trim().toLowerCase(); }
      function today() { return new Date().toISOString().slice(0, 10); }
      function stripHtml(s) { return String(s || '').replace(/<rt>[^<]*<\/rt>/g, '').replace(/<[^>]+>/g, ''); }
      return {
        addWord(en, meta) {
          if (!en) return;
          const data = load();
          const key = norm(en);
          const ja = stripHtml((meta && meta.ja) || '');
          const ex = (meta && meta.ex) || '';
          const exJa = (meta && meta.exJa) || '';
          if (!data[key]) {
            data[key] = {
              en: String(en).trim(),
              ja: ja,
              ex: ex,
              exJa: exJa,
              learned_at: today(),
              mastery: 0,
              perfectDays: []
            };
          } else {
            if (ja && !data[key].ja) data[key].ja = ja;
            if (ex && !data[key].ex) data[key].ex = ex;
            if (exJa && !data[key].exJa) data[key].exJa = exJa;
          }
          save(data);
        },
        incMastery(en) {
          if (!en) return;
          const data = load();
          const key = norm(en);
          if (!data[key]) {
            data[key] = { en: String(en).trim(), ja: '', ex: '', exJa: '', learned_at: today(), mastery: 0, perfectDays: [] };
          }
          data[key].mastery = (data[key].mastery || 0) + 1;
          save(data);
        },
        markPerfectDay(words, date) {
          if (!Array.isArray(words)) return;
          const d = date || today();
          const data = load();
          words.forEach(en => {
            const key = norm(en);
            if (!data[key]) return;
            data[key].perfectDays = data[key].perfectDays || [];
            if (!data[key].perfectDays.includes(d)) data[key].perfectDays.push(d);
          });
          save(data);
        },
        count() { return Object.keys(load()).length; }
      };
    })();

    // ══════════════════════════════════════════════
    //  音声：最良の英語音声を自動選択
    // ══════════════════════════════════════════════
    let bestVoice = null;
    let voiceA = null;

    function initVoice() {
      const voices = speechSynthesis.getVoices();
      if (!voices.length) return;
      const enVoices = voices.filter(v => v.lang === 'en-US' || v.lang === 'en-GB' || v.lang.startsWith('en'));
      const preferredFemale = ['Samantha', 'Karen', 'Moira', 'Serena', 'Tessa', 'Google US English'];
      for (const name of preferredFemale) {
        const v = enVoices.find(v => v.name === name);
        if (v) { bestVoice = v; break; }
      }
      if (!bestVoice) bestVoice = enVoices[0] || null;
      const preferredMale = ['Alex', 'Daniel', 'Fred', 'Tom', 'Arthur', 'Google UK English Male'];
      for (const name of preferredMale) {
        const v = enVoices.find(v => v.name === name);
        if (v) { voiceA = v; break; }
      }
      if (!voiceA) {
        voiceA = enVoices.find(v => v !== bestVoice) || bestVoice;
      }
    }

    if ('speechSynthesis' in window) {
      speechSynthesis.onvoiceschanged = initVoice;
      initVoice();
    }

    // 読み上げ停止用
    let speakSessionId = 0;
    let currentUtterance = null;

    function stopSpeaking() {
      speakSessionId++;
      // 今の発話を即座にミュート（Safariでcancel()が効かない対策）
      if (currentUtterance) {
        currentUtterance.volume = 0;
        currentUtterance.onend = null;
      }
      currentUtterance = null;
      if ('speechSynthesis' in window) {
        speechSynthesis.pause();
        speechSynthesis.cancel();
      }
    }

    function speakUtterance(utt, onDone) {
      currentUtterance = utt;
      utt.onend = onDone;
      utt.onerror = onDone;
      speechSynthesis.speak(utt);
    }

    // 文を分割して、文と文の間にポーズを入れて読み上げる
    function speakText(text, useVoice) {
      if (!('speechSynthesis' in window)) return;
      stopSpeaking();
      const mySession = speakSessionId;
      const cleaned = text.trim();
      const sentences = cleaned.match(/[^.!?]+[.!?]+/g) || [cleaned];
      const voice = useVoice || bestVoice;
      let i = 0;
      function speakNext() {
        if (mySession !== speakSessionId) return;
        if (i >= sentences.length) return;
        const utt = new SpeechSynthesisUtterance(sentences[i].trim());
        utt.lang = 'en-US';
        utt.rate = 0.85;
        utt.pitch = (voice === voiceA) ? 0.7 : 1.4;
        if (voice) utt.voice = voice;
        speakUtterance(utt, () => { i++; setTimeout(speakNext, 500); });
      }
      speakNext();
    }

    function speakDialogue(textA, textB) {
      if (!('speechSynthesis' in window)) return;
      stopSpeaking();
      const mySession = speakSessionId;
      const cleanA = textA.trim();
      const cleanB = textB.trim();
      const sentencesA = cleanA.match(/[^.!?]+[.!?]+/g) || [cleanA];
      let i = 0;
      function speakNextA() {
        if (mySession !== speakSessionId) return;
        if (i >= sentencesA.length) {
          setTimeout(() => {
            if (mySession !== speakSessionId) return;
            const sentencesB = cleanB.match(/[^.!?]+[.!?]+/g) || [cleanB];
            let j = 0;
            function speakNextB() {
              if (mySession !== speakSessionId) return;
              if (j >= sentencesB.length) return;
              const uttB = new SpeechSynthesisUtterance(sentencesB[j].trim());
              uttB.lang = 'en-US'; uttB.rate = 0.85; uttB.pitch = 1.4;
              if (bestVoice) uttB.voice = bestVoice;
              speakUtterance(uttB, () => { j++; setTimeout(speakNextB, 500); });
            }
            speakNextB();
          }, 800);
          return;
        }
        const uttA = new SpeechSynthesisUtterance(sentencesA[i].trim());
        uttA.lang = 'en-US'; uttA.rate = 0.85; uttA.pitch = 0.7;
        if (voiceA) uttA.voice = voiceA;
        speakUtterance(uttA, () => { i++; setTimeout(speakNextA, 500); });
      }
      speakNextA();
    }

    // 会話形式（A: ... B: ...）を判定して適切に読み上げる
    function speakQ1Sentence(text) {
      // "A: ..." と " B: ..." の両方があるか（Bの前にスペースがあるパターン）
      const hasDialogue = /(?:^|\s)A:\s/.test(text) && /\s+B:\s/.test(text);
      if (hasDialogue) {
        const parts = text.split(/\s+B:\s*/);
        const partA = parts[0].replace(/^\s*A:\s*/, '').trim();
        const partB = parts.slice(1).join(' ').trim();
        speakDialogue(partA, partB);
      } else {
        // 会話形式でなくても先頭の "A: " は除去
        const cleaned = text.replace(/^\s*A:\s*/, '').trim();
        speakText(cleaned);
      }
    }

    // ══════════════════════════════════════════════
    //  タブ切り替え
    // ══════════════════════════════════════════════
    const tabs = ['vocab', 'q1', 'q2', 'q3'];

    function switchTab(tab) {
      tabs.forEach(t => {
        document.getElementById('mode-' + t).style.display = (t === tab) ? 'block' : 'none';
      });
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', tabs[i] === tab);
      });
      currentTab = tab;

    //  回答ログ（localStorage）
    // ══════════════════════════════════════════════

    function loadAnswerLog() {
      try { return JSON.parse(localStorage.getItem(ANSWER_LOG_KEY) || '[]'); }
      catch(e) { return []; }
    }

    function saveAnswerRecord(record) {
      const log = loadAnswerLog();
      log.push(record);
      if (log.length > 1000) log.splice(0, log.length - 1000);
      localStorage.setItem(ANSWER_LOG_KEY, JSON.stringify(log));
    }

    function exportAnswerLog() {
      const log = loadAnswerLog();
      if (log.length === 0) {
        alert('まだ かいとうデータが ないよ！');
        return;
      }
      const data = {
        exportDate: new Date().toISOString(),
        totalRecords: log.length,
        summary: {
          vocab: { total: log.filter(r=>r.type==='vocab').length, remembered: log.filter(r=>r.type==='vocab'&&r.result==='remembered').length },
          q1: { total: log.filter(r=>r.type==='q1').length, correct: log.filter(r=>r.type==='q1'&&r.correct).length },
          q2: { total: log.filter(r=>r.type==='q2').length, correct: log.filter(r=>r.type==='q2'&&r.correct).length },
          q3: { total: log.filter(r=>r.type==='q3').length, correct: log.filter(r=>r.type==='q3'&&r.correct).length }
        },
        records: log
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `eiken5-log-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function resetAnswerLog() {
      if (confirm('かいとうデータを ぜんぶ けしてもいい？')) {
        localStorage.removeItem(ANSWER_LOG_KEY);
        localStorage.removeItem('eiken5_q1_score');
        localStorage.removeItem('eiken5_q1_total');

        localStorage.removeItem('eiken5_q2_score');

        q1Score = 0; q1Total = 0; q1Index = 0;
        q2Score = 0; q2Total = 0; q2Index = 0;
        solvedCount = 0; q3Index = 0;
        updateQ1Score(); updateQ2Score();
        alert('データを けしたよ！');
      }
    }

    // ─── localStorage（単語学習） ───
    const STORAGE_KEY = 'eiken5_vocab_learned';

    function loadLearnedWords() {
      try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
      catch(e) { return new Set(); }
    }

    function saveLearnedWord(english) {
      const learned = loadLearnedWords();
      learned.add(english);
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
    }

    function resetLearnedWords() {
      localStorage.removeItem(STORAGE_KEY);
    }

    // ─── State ───
    const SESSION_SIZE = 10;
    let vocabMode = 'normal';
    let vocabQueue = [];
    let vocabRetry = [];
    let vocabCurrentIndex = 0;
    let vocabSessionOk = 0;
    let vocabRevealed = false;

    function shuffleArray(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function updateGlobalProgress() {
      const learned = loadLearnedWords();
      const total = vocabList.length;
      const done = [...learned].filter(w => vocabList.some(v => v.english === w)).length;
      document.getElementById('vocab-global-text').innerHTML = `<ruby>全体<rt>ぜんたい</rt></ruby>：${total}<ruby>語中<rt>ごちゅう</rt></ruby> ${done}<ruby>語<rt>ご</rt></ruby>おぼえた！`;
      document.getElementById('vocab-global-fill').style.width = (total > 0 ? (done / total * 100) : 0) + '%';
    }

    function setVocabMode(mode) {
      vocabMode = mode;
      document.getElementById('btn-mode-normal').classList.toggle('active', mode === 'normal');
      document.getElementById('btn-mode-review').classList.toggle('active', mode === 'review');
      initVocab();
    }

    function initVocab() {
      const learned = loadLearnedWords();
      let pool;
      if (vocabMode === 'review') {
        pool = vocabList.filter(v => learned.has(v.english));
        if (pool.length === 0) {
          updateGlobalProgress();
          showSessionEnd('まだおぼえた<ruby>単語<rt>たんご</rt></ruby>がないよ！', '<ruby>先<rt>さき</rt></ruby>に「まだおぼえてない<ruby>単語<rt>たんご</rt></ruby>」で<ruby>練習<rt>れんしゅう</rt></ruby>しよう！', null);
          return;
        }
      } else {
        pool = vocabList.filter(v => !learned.has(v.english));
        if (pool.length === 0) {
          updateGlobalProgress();
          showSessionEnd('🎉 <ruby>全部<rt>ぜんぶ</rt></ruby>おぼえた！すごい！', '<ruby>全<rt>すべ</rt></ruby>ての<ruby>単語<rt>たんご</rt></ruby>をマスターしたよ！おめでとう！', null);
          return;
        }
      }
      vocabQueue = shuffleArray(pool).slice(0, SESSION_SIZE);
      vocabRetry = [];
      vocabCurrentIndex = 0;
      vocabSessionOk = 0;
      vocabRevealed = false;
      document.getElementById('vocab-session-end').style.display = 'none';
      document.getElementById('vocab-card-area').style.display = 'block';
      updateGlobalProgress();
      showVocabCard();
    }

    function showVocabCard() {
      const allDone = vocabCurrentIndex >= vocabQueue.length && vocabRetry.length === 0;
      if (allDone) {
        const learned = loadLearnedWords();
        const remaining = vocabList.filter(v => !learned.has(v.english)).length;
        if (vocabMode === 'normal' && remaining > 0) {
          showSessionEnd('✨ セッションかんりょう！', `このセットを<ruby>練習<rt>れんしゅう</rt></ruby>したよ！まだ${remaining}<ruby>語<rt>ご</rt></ruby><ruby>残<rt>のこ</rt></ruby>ってるよ。`, '<ruby>次<rt>つぎ</rt></ruby>の10<ruby>語<rt>ご</rt></ruby>へ ➔');
        } else if (vocabMode === 'normal') {
          showSessionEnd('🎉 <ruby>全部<rt>ぜんぶ</rt></ruby>おぼえた！すごい！', '<ruby>全<rt>すべ</rt></ruby>ての<ruby>単語<rt>たんご</rt></ruby>をマスターしたよ！おめでとう！', null);
        } else {
          showSessionEnd('✨ <ruby>復習<rt>ふくしゅう</rt></ruby>かんりょう！', 'よくがんばったね！また<ruby>復習<rt>ふくしゅう</rt></ruby>しよう！', 'もう<ruby>一度<rt>いちど</rt></ruby><ruby>復習<rt>ふくしゅう</rt></ruby>する ➔');
        }
        updateGlobalProgress();
        return;
      }
      if (vocabCurrentIndex >= vocabQueue.length) {
        vocabQueue = shuffleArray(vocabRetry);
        vocabRetry = [];
        vocabCurrentIndex = 0;
      }
      const card = vocabQueue[vocabCurrentIndex];
      vocabRevealed = false;
      document.getElementById('vocab-english').innerText = card.english;
      document.getElementById('vocab-japanese').style.display = 'none';
      document.getElementById('vocab-example').style.display = 'none';
      document.getElementById('btn-reveal').style.display = 'inline-block';
      document.getElementById('btn-ok').style.display = 'none';
      document.getElementById('btn-retry').style.display = 'none';
      document.getElementById('btn-speak').style.display = 'none';
      document.getElementById('vocab-done-msg').innerText = '';
      updateVocabProgress(vocabSessionOk, vocabQueue.length);
    }

    function updateVocabProgress(done, total) {
      document.getElementById('vocab-progress-text').innerText = `このセット：${done} / ${total} おぼえた`;
      document.getElementById('vocab-progress-fill').style.width = (total > 0 ? (done / total * 100) : 0) + '%';
    }

    function showSessionEnd(title, msg, btnLabel) {
      document.getElementById('vocab-card-area').style.display = 'none';
      document.getElementById('vocab-session-end').style.display = 'block';
      document.getElementById('vocab-session-end-title').innerHTML = title;
      document.getElementById('vocab-session-end-msg').innerHTML = msg;
      const btn = document.getElementById('btn-next-session');
      if (btnLabel) {
        btn.style.display = 'inline-block';
        btn.innerHTML = btnLabel;
      } else {
        btn.style.display = 'none';
      }
    }

    function startNextSession() {
      initVocab();
    }

    function revealVocab() {
      const card = vocabQueue[vocabCurrentIndex];
      document.getElementById('vocab-japanese').innerHTML = card.japanese;
      document.getElementById('vocab-japanese').style.display = 'block';
      document.getElementById('vocab-example').innerText = '例: ' + card.example;
      document.getElementById('vocab-example').style.display = 'block';
      document.getElementById('btn-reveal').style.display = 'none';
      document.getElementById('btn-ok').style.display = 'inline-block';
      document.getElementById('btn-retry').style.display = 'inline-block';
      document.getElementById('btn-speak').style.display = 'inline-block';
      vocabRevealed = true;
      speakText(card.english);
    }

    function speakVocab() {
      const card = vocabQueue[vocabCurrentIndex];
      if (card) speakText(card.english);
    }

    function vocabResult(ok) {
      const card = vocabQueue[vocabCurrentIndex];
      saveAnswerRecord({
        type: 'vocab',
        english: card.english,
        japanese: card.japanese.replace(/<rt>[^<]*<\/rt>/g, '').replace(/<[^>]+>/g, ''),
        result: ok ? 'remembered' : 'retry',
        timestamp: new Date().toISOString()
      });
      if (ok) {
        vocabSessionOk++;
        saveLearnedWord(card.english);
        // ずかんに追加＋マスタリー加算
        otowaCollection.addWord(card.english, { ja: card.japanese, ex: card.example });
        otowaCollection.incMastery(card.english);
      } else {
        vocabRetry.push(card);
        // まだ覚えていない語も「出会った」記録として追加（mastery=0）
        otowaCollection.addWord(card.english, { ja: card.japanese, ex: card.example });
      }
      vocabCurrentIndex++;
      showVocabCard();
    }

    function resetVocabProgress() {
      if (confirm('おぼえた たんごの きろくを ぜんぶ リセットしてもいい？')) {
        resetLearnedWords();
        vocabMode = 'normal';
        document.getElementById('btn-mode-normal').classList.add('active');
        document.getElementById('btn-mode-review').classList.remove('active');
        initVocab();
      }
    }

    // ─── 共通：紙吹雪＋ファンファーレ ───
    function showConfetti() {
      const container = document.createElement('div');
      container.className = 'confetti-container';
      document.body.appendChild(container);
      const colors = ['#FF8A80','#FFD54F','#4DB6AC','#81D4FA','#CE93D8','#A5D6A7','#FF80AB'];
      for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + '%';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDelay = Math.random() * 1.5 + 's';
        c.style.animationDuration = (2 + Math.random() * 2) + 's';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.width = (6 + Math.random() * 8) + 'px';
        c.style.height = (6 + Math.random() * 8) + 'px';
        container.appendChild(c);
      }
      setTimeout(() => container.remove(), 4000);
    }

    function playFanfare() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const notes = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'triangle';
          gain.gain.value = 0.15;
          gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.3);
          osc.start(ctx.currentTime + i * 0.15);
          osc.stop(ctx.currentTime + i * 0.15 + 0.3);
        });
        // Final chord
        [523.25, 659.25, 783.99, 1046.50].forEach(freq => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'triangle';
          gain.gain.value = 0.12;
          gain.gain.setValueAtTime(0.12, ctx.currentTime + 1.3);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 2.5);
          osc.start(ctx.currentTime + 1.3);
          osc.stop(ctx.currentTime + 2.5);
        });
      } catch(e) {}
    }

    function showSetComplete(prefix, setSize, score) {
      document.getElementById(prefix + '-quiz-area').style.display = 'none';
      const completeEl = document.getElementById(prefix + '-set-complete');
      completeEl.classList.add('show');
      document.getElementById(prefix + '-complete-title').innerHTML = '🎉 ぜんぶできた！すごい！！';
      document.getElementById(prefix + '-complete-score').innerHTML = `${setSize}もんちゅう ${score}もん <ruby>正解<rt>せいかい</rt></ruby>！`;
      showConfetti();
      playFanfare();
    }

    // ─── Q1：セット制＋学習フロー ───
    const Q1_SET_SIZE = 15;
    let q1Index = parseInt(localStorage.getItem('eiken5_q1_index') || '0');
    let q1SetQueue = [];
    let q1RetryQueue = [];
    let q1SetPos = 0;
    let q1SetScore = 0;
    let q1IsRetry = false;
    let q1WaitingTap = false;
    let currentQ1 = null;

    function startQ1Set() {
      document.getElementById('q1-set-complete').classList.remove('show');
      document.getElementById('q1-quiz-area').style.display = 'block';
      q1SetQueue = [];
      q1RetryQueue = [];
      q1SetPos = 0;
      q1SetScore = 0;
      for (let i = 0; i < Q1_SET_SIZE; i++) {
        if (q1Index >= questionsQ1.length) q1Index = 0;
        q1SetQueue.push(questionsQ1[q1Index]);
        q1Index++;
      }
      localStorage.setItem('eiken5_q1_index', q1Index.toString());
      loadQ1();
    }

    function loadQ1() {
      // 前の問題の読み上げを停止
      stopSpeaking();
      // Check if set is done
      if (q1SetPos >= q1SetQueue.length) {
        if (q1RetryQueue.length > 0) {
          q1SetQueue = [...q1RetryQueue];
          q1RetryQueue = [];
          q1SetPos = 0;
          q1IsRetry = true;
        } else {
          showSetComplete('q1', Q1_SET_SIZE, q1SetScore);
          return;
        }
      }

      q1WaitingTap = false;
      document.getElementById('q1-next-btn').style.display = 'none';
      document.getElementById('q1-message').innerHTML = '';
      document.getElementById('q1-choices').innerHTML = '';
      document.getElementById('q1-explanation').classList.remove('show');

      currentQ1 = q1SetQueue[q1SetPos];
      const total = q1IsRetry ? q1SetQueue.length : Q1_SET_SIZE;
      const pos = q1SetPos + 1;
      const label = q1IsRetry ? '🔄 もういちど！' : `${pos} / ${total}もんめ`;
      document.getElementById('q1-progress').innerHTML = label;
      document.getElementById('q1-progress-fill').style.width = (q1IsRetry ? 50 : (pos / total * 100)) + '%';

      document.getElementById('q1-hint').innerHTML = currentQ1.hint || '';
      const sentenceHTML = (currentQ1.sentence || '').replace('( )', '<span class="q-blank">　　　</span>');
      document.getElementById('q1-sentence').innerHTML = sentenceHTML;

      const choices = shuffleArray(currentQ1.choices);
      const grid = document.getElementById('q1-choices');
      choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';

      shimaenaga: `<svg class="animal-icon" viewBox="0 0 100 100" width="80" height="80"><ellipse cx="50" cy="55" rx="35" ry="40" fill="#FFFFFF"/><path d="M 15 50 Q 5 60 10 70 Q 20 60 20 50" fill="#8D6E63"/><path d="M 85 50 Q 95 60 90 70 Q 80 60 80 50" fill="#8D6E63"/><circle cx="38" cy="45" r="4" fill="#212121"/><circle cx="62" cy="45" r="4" fill="#212121"/><polygon points="48,50 52,50 50,54" fill="#212121"/><circle cx="30" cy="50" r="4" fill="#FFCDD2" opacity="0.8"/><circle cx="70" cy="50" r="4" fill="#FFCDD2" opacity="0.8"/><path d="M 40 95 Q 35 105 30 95 M 60 95 Q 65 105 70 95" stroke="#8D6E63" fill="none" stroke-width="3" stroke-linecap="round"/></svg>`
    };

    const questionsQ3 = [
      // ── 基本文（やさしめ） ──
      { hint: "「<ruby>私<rt>わたし</rt></ruby>はテニスをします。」", words: ["tennis", "I", "play", "."], answer: "I play tennis .", explanation: "「だれが」→「なにをする」→「なにを」の順。I play tennis だよ。" },
      { hint: "「あなたは<ruby>学生<rt>がくせい</rt></ruby>です。」", words: ["are", "student", "a", "You", "."], answer: "You are a student .", explanation: "You are ～ = あなたは～です。a student の a をわすれないでね。" },
      { hint: "「これはペンです。」", words: ["pen", "This", "a", "is", "."], answer: "This is a pen .", explanation: "This is ～ = これは～です。a pen で「1本のペン」だよ。" },
      { hint: "「<ruby>私<rt>わたし</rt></ruby>は２ひきのねこをかっています。」", words: ["have", "I", "cats", "two", "."], answer: "I have two cats .", explanation: "I have ～ = わたしは～をもっている。two cats = 2ひきのねこ。" },
      { hint: "「あなたはおんがくがすきですか？」", words: ["music", "Do", "like", "you", "?"], answer: "Do you like music ?", explanation: "しつもんは Do you ～? のじゅんばん。Do が先にくるよ。" },
      { hint: "「<ruby>私<rt>わたし</rt></ruby>たちは<ruby>学校<rt>がっこう</rt></ruby>へいきます。」", words: ["go", "to", "school", "We", "."], answer: "We go to school .", explanation: "go to ～ = ～へいく。We go to school だよ。" },
      { hint: "「これはなんですか？」", words: ["this", "What", "is", "?"], answer: "What is this ?", explanation: "しつもんのことば（What）がいちばん前にくるよ。What is this?" },
      { hint: "「おげんきですか？」", words: ["are", "How", "you", "?"], answer: "How are you ?", explanation: "あいさつのきまりもんく。How are you? でそのままおぼえよう！" },
      { hint: "「サッカーをしましょう。」", words: ["soccer", "Let's", "play", "."], answer: "Let's play soccer .", explanation: "Let's ～ = ～しましょう。Let's のあとに play soccer がくるよ。" },
      { hint: "「また<ruby>明日<rt>あした</rt></ruby>。」", words: ["tomorrow", "you", "See", "."], answer: "See you tomorrow .", explanation: "See you ～ = またね。きまりもんくだからそのままおぼえよう！" },
      // ── 過去問ベース ──
      { hint: "「これらは<ruby>私<rt>わたし</rt></ruby>のくつではありません。」 These ( ) shoes.", words: ["are", "not", "my", "."], answer: "are not my .", explanation: "are not = ～ではない。These are not my shoes = これらはわたしのくつじゃない。" },
      { hint: "「シドニーはうつくしい<ruby>都市<rt>とし</rt></ruby>です。」 Sydney ( ).", words: ["city", "a", "is", "beautiful", "."], answer: "is a beautiful city .", explanation: "beautiful（うつくしい）は city（とし）のまえにおくよ。a beautiful city!" },
      { hint: "「<ruby>私<rt>わたし</rt></ruby>のおにいちゃんは<ruby>毎朝<rt>まいあさ</rt></ruby>かみをあらいます。」 ( ) morning.", words: ["washes", "every", "his hair", "My brother", "."], answer: "My brother washes his hair every .", explanation: "「だれが」My brother →「なにをする」washes →「なにを」his hair → every morning" },
      { hint: "「<ruby>山田<rt>やまだ</rt></ruby>さんのジャケットはどこですか。」 ( ) ?", words: ["Mr. Yamada's", "jacket", "is", "Where", "?"], answer: "Where is Mr. Yamada's jacket ?", explanation: "Where is ～? = ～はどこ？ Where がいちばん前にくるよ。" },
      { hint: "「あなたは<ruby>私<rt>わたし</rt></ruby>のコンサートにこられますか。」 ( ) my concert?", words: ["to", "can", "come", "you", "?"], answer: "can you come to ?", explanation: "Can you ～? = ～できる？ come to ～ = ～にくる。" },
      { hint: "「<ruby>私<rt>わたし</rt></ruby>はシンガポールにたくさんのともだちがいます。」 I ( ) in Singapore.", words: ["of", "friends", "a lot", "have", "."], answer: "have a lot of friends .", explanation: "a lot of ～ = たくさんの～。have a lot of friends = たくさんのともだちがいる。" },
      { hint: "「このはなはトムへのプレゼントです。」 This flower ( ).", words: ["Tom", "is", "for", "a present", "."], answer: "is a present for Tom .", explanation: "a present for ～ = ～へのプレゼント。for は「～のために」だよ。" },
      { hint: "「ビルと<ruby>私<rt>わたし</rt></ruby>は<ruby>冬<rt>ふゆ</rt></ruby>にスキーにいきます。」 Bill ( ) in winter.", words: ["skiing", "go", "and", "I", "."], answer: "and I go skiing .", explanation: "go skiing = スキーにいく。Bill and I で「ビルとわたし」だよ。" },
      { hint: "「<ruby>私<rt>わたし</rt></ruby>は<ruby>毎晩<rt>まいばん</rt></ruby>8じかんねむります。」 I ( ) every night.", words: ["sleep", "hours", "for", "eight", "."], answer: "sleep for eight hours .", explanation: "for eight hours = 8じかん。sleep for ～ = ～のあいだねむる。" },
      { hint: "「キャシーはどこでテニスをしますか。」 ( ) tennis?", words: ["does", "Where", "Cathy", "play", "?"], answer: "Where does Cathy play ?", explanation: "Where does ～ play? のじゅんばん。does は she/he のしつもんで使うよ。" },
      { hint: "「あなたのおかあさんのなまえはひろこですか。」 ( ) Hiroko?", words: ["name", "mother's", "Is", "your", "?"], answer: "Is your mother's name ?", explanation: "Is ～? = ～ですか？ your mother's name = あなたのおかあさんのなまえ。" },
      { hint: "「ジュディ、おねえさんはどうやってピアノをれんしゅうしますか。」 Judy, ( ) the piano?", words: ["practice", "how", "your sister", "does", "?"], answer: "how does your sister practice ?", explanation: "How does ～? = どうやって～する？ how → does → だれが → なにをする のじゅんばん。" },
      { hint: "「<ruby>私<rt>わたし</rt></ruby>はいつも<ruby>朝<rt>あさ</rt></ruby>6じにおきます。」 I always ( ) in the morning.", words: ["up", "get", "six", "at", "."], answer: "get up at six .", explanation: "get up = おきる。at six = 6じに。get up at six!" },
      { hint: "「<ruby>私<rt>わたし</rt></ruby>たちは<ruby>毎日<rt>まいにち</rt></ruby>、きょうしつをそうじします。」 ( ) every day.", words: ["clean", "classroom", "our", "We", "."], answer: "We clean our classroom .", explanation: "「だれが」We →「なにをする」clean →「なにを」our classroom のじゅんばんだよ。" },
      { hint: "「まどをしめてくれますか。」 ( ), please?", words: ["you", "close", "Can", "the window", "?"], answer: "Can you close the window ?", explanation: "Can you ～? = ～してくれる？ Can → you → close → the window だよ。" },
      // ── 音羽の苦手単語を使ったオリジナル ──
      { hint: "「<ruby>私<rt>わたし</rt></ruby>はバスで<ruby>学校<rt>がっこう</rt></ruby>にいきます。」", words: ["go", "bus", "I", "by", "to", "school", "."], answer: "I go to school by bus .", explanation: "go to school = がっこうにいく。by bus = バスで。「手だん」は by だよ。" },
      { hint: "「あなたはバスケットボールがすきですか？」", words: ["basketball", "Do", "like", "you", "?"], answer: "Do you like basketball ?", explanation: "Do you like ～? = ～がすきですか？ Do が先にくるよ。" },
      { hint: "「<ruby>私<rt>わたし</rt></ruby>のおばさんはせがたかいです。」", words: ["is", "tall", "My", "aunt", "."], answer: "My aunt is tall .", explanation: "My aunt = わたしのおばさん。is tall = せがたかい。aunt = おばさん だよ。" },
      { hint: "「あの<ruby>女<rt>おんな</rt></ruby>の<ruby>子<rt>こ</rt></ruby>はだれですか？」", words: ["is", "that", "Who", "girl", "?"], answer: "Who is that girl ?", explanation: "Who is ～? = ～はだれ？ that girl = あのおんなのこ。" },
      { hint: "「オレンジジュースをのみましょう。」", words: ["drink", "Let's", "juice", "orange", "."], answer: "Let's drink orange juice .", explanation: "Let's ～ = ～しましょう。orange juice = オレンジジュース。" },
      { hint: "「<ruby>台所<rt>だいどころ</rt></ruby>でチョコレートをつくりましょう。」", words: ["make", "the kitchen", "in", "chocolate", "Let's", "."], answer: "Let's make chocolate in the kitchen .", explanation: "Let's make ～ = ～をつくろう。in the kitchen = だいどころで。" },
      { hint: "「あたらしいじてんしゃがほしいです。」", words: ["want", "a", "bike", "new", "I", "."], answer: "I want a new bike .", explanation: "I want ～ = ～がほしい。a new bike = あたらしいじてんしゃ。new が bike のまえだよ。" },
      { hint: "「<ruby>彼女<rt>かのじょ</rt></ruby>は<ruby>赤<rt>あか</rt></ruby>いりんごをもっています。」", words: ["has", "red", "apple", "a", "She", "."], answer: "She has a red apple .", explanation: "She has ～ = かのじょは～をもっている。she のときは has（have じゃないよ）。" },
      { hint: "「<ruby>私<rt>わたし</rt></ruby>のちちはいしゃです。」", words: ["doctor", "is", "My", "a", "father", "."], answer: "My father is a doctor .", explanation: "My father = わたしのおとうさん。a doctor = おいしゃさん。" },
      { hint: "「ほうかご、<ruby>私<rt>わたし</rt></ruby>はテニスをします。」", words: ["tennis", "play", "after", "I", "school", "."], answer: "I play tennis after school .", explanation: "after school = ほうかご。I play tennis が先で、after school が最後だよ。" },
    ];

    // ─── Q3：セット制＋学習フロー ───
    const Q3_SET_SIZE = 5;
    let q3Index = parseInt(localStorage.getItem('eiken5_q3_index') || '0');
    let q3SetQueue = [];
    let q3RetryQueue = [];
    let q3SetPos = 0;
    let q3SetScore = 0;
    let q3IsRetry = false;
    let currentQuestion = null;
    let poolWords = [];
    let selectedWords = [];

    function startQ3Set() {
      document.getElementById('q3-set-complete').classList.remove('show');
      document.getElementById('q3-quiz-area').style.display = 'block';
      q3SetQueue = [];
      q3RetryQueue = [];
      q3SetPos = 0;
      q3SetScore = 0;
      q3IsRetry = false;
      for (let i = 0; i < Q3_SET_SIZE; i++) {
        if (q3Index >= questionsQ3.length) q3Index = 0;
        q3SetQueue.push(questionsQ3[q3Index]);
        q3Index++;
      }
      localStorage.setItem('eiken5_q3_index', q3Index.toString());
      loadQ3();
    }

    function loadQ3() {
      if (q3SetPos >= q3SetQueue.length) {
        if (q3RetryQueue.length > 0) {
          q3SetQueue = [...q3RetryQueue];
          q3RetryQueue = [];
          q3SetPos = 0;
          q3IsRetry = true;
        } else {
          showSetComplete('q3', Q3_SET_SIZE, q3SetScore);
          return;
        }
      }

      currentQuestion = q3SetQueue[q3SetPos];
      const total = q3IsRetry ? q3SetQueue.length : Q3_SET_SIZE;
      const pos = q3SetPos + 1;
      const label = q3IsRetry ? '🔄 もういちど！' : `${pos} / ${total}もんめ`;
      document.getElementById('q3-progress').innerHTML = label;
      document.getElementById('q3-progress-fill').style.width = (q3IsRetry ? 50 : (pos / total * 100)) + '%';

      loadQuestionUI();
    }

    function loadQuestionUI() {
      let displayHint = currentQuestion.hint;
      if (!displayHint.startsWith("「")) displayHint = "「" + displayHint + "」";
      document.getElementById("japanese-hint").innerHTML = displayHint;
      document.getElementById("message").innerHTML = '';
      document.getElementById("train-track").style.backgroundColor = "#FAFAFA";
      document.getElementById("check-btn").style.display = "inline-block";
      document.getElementById("reset-btn").style.display = "inline-block";
      document.getElementById("next-btn").style.display = "none";
      document.getElementById("q3-explanation").classList.remove('show');

      const pool = document.getElementById("words-pool");
      pool.innerHTML = '';
      poolWords = [];
      selectedWords = [];

      const displayWords = currentQuestion.words.filter(w => !['.',  '?', ',', '!'].includes(w));
      let shuffled = [...displayWords].sort(() => Math.random() - 0.5);
      shuffled.forEach((word, i) => {
        poolWords.push({ id: i, word: word, isUsed: false });
        let btn = document.createElement("div");
        btn.className = "word-btn";
        btn.innerText = word;
        btn.id = `pool-btn-${i}`;
        btn.onclick = () => selectWord(i);
        pool.appendChild(btn);
      });
      renderTrack();
    }

    function selectWord(id) {
      if (poolWords[id].isUsed) return;
      poolWords[id].isUsed = true;
      document.getElementById(`pool-btn-${id}`).classList.add("hidden");
      selectedWords.push(poolWords[id]);
      renderTrack();
    }

    function undoWord(idx) {
      const removed = selectedWords.splice(idx, 1)[0];
      removed.isUsed = false;
      document.getElementById(`pool-btn-${removed.id}`).classList.remove("hidden");
      renderTrack();
    }

    function renderTrack() {
      const track = document.getElementById("train-track");
      track.innerHTML = '';
      selectedWords.forEach((item, index) => {
        let span = document.createElement("div");
        span.className = "word-btn";
        span.innerText = item.word;
        span.onclick = () => undoWord(index);
        track.appendChild(span);
      });
    }

    function resetTrack() {
      selectedWords.forEach(item => {
        item.isUsed = false;
        document.getElementById(`pool-btn-${item.id}`).classList.remove("hidden");
      });
      selectedWords = [];
      renderTrack();
      document.getElementById("message").innerHTML = '';
      document.getElementById("train-track").style.backgroundColor = "#FAFAFA";
    }

    function checkAnswer() {
      if (selectedWords.length === 0) return;
      const userAnswer = selectedWords.map(item => item.word).join(" ");
      const nUser = userAnswer.replace(/\s+/g, '').toLowerCase();
      const nAns  = currentQuestion.answer.replace(/[.?,!]/g, '').replace(/\s+/g, '').toLowerCase();
      const nWords = currentQuestion.words.filter(w => !['.',  '?', ',', '!'].includes(w)).join('').toLowerCase();

      const msgEl = document.getElementById("message");
      const trackEl = document.getElementById("train-track");
      const correct = (nUser === nAns || nUser === nWords);

      saveAnswerRecord({
        type: 'q3',
        hint: currentQuestion.hint.replace(/<rt>[^<]*<\/rt>/g, '').replace(/<[^>]+>/g, ''),
        correctAnswer: currentQuestion.answer,
        userAnswer: userAnswer,
        correct: correct,
        isRetry: q3IsRetry,
        timestamp: new Date().toISOString()
      });

      if (correct) {
        q3SetScore++;
        msgEl.style.color = "var(--success)";
        msgEl.innerHTML = q3IsRetry ? '🌟 おぼえたね！すごい！' : '🎉 <ruby>大正解<rt>だいせいかい</rt></ruby>！ナイス！';
        trackEl.style.backgroundColor = "#E8F5E9";
        speakText(currentQuestion.answer);
        document.getElementById("check-btn").style.display = "none";
        document.getElementById("reset-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "inline-block";
      } else {
        msgEl.style.color = "var(--error)";
        msgEl.innerHTML = `😢 <ruby>不正解<rt>ふせいかい</rt></ruby>… <ruby>正<rt>ただ</rt></ruby>しいこたえ：<strong>${currentQuestion.answer}</strong>`;
        trackEl.style.backgroundColor = "#FFEBEE";
        // 解説表示
        const expEl = document.getElementById('q3-explanation');
        expEl.innerHTML = '💡 ' + (currentQuestion.explanation || '');
        expEl.classList.add('show');
        // リトライキューに追加
        if (!q3IsRetry) q3RetryQueue.push(currentQuestion);
        // 正解を読み上げ
        speakText(currentQuestion.answer);
        document.getElementById("check-btn").style.display = "none";
        document.getElementById("reset-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "inline-block";
      }
    }

    function nextQ3() {
      q3SetPos++;
      loadQ3();
    }

    // ══════════════════════════════════════════════
    //  初期化
    // ══════════════════════════════════════════════
    window.onload = function() {
      initVocab();
    };

    // タブ切り替え時にセットを開始
    const origSwitchTab = switchTab;
    let q1Loaded = false;
    let q2Loaded = false;
    let q3Loaded = false;

    switchTab = function(tab) {
      origSwitchTab(tab);
      if (tab === 'q1' && !q1Loaded) { q1Loaded = true; startQ1Set(); }
      if (tab === 'q2' && !q2Loaded) { q2Loaded = true; startQ2Set(); }
      if (tab === 'q3' && !q3Loaded) { q3Loaded = true; startQ3Set(); }
    };
  </script>

</html>
