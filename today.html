<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="きょうの音羽">
<meta name="theme-color" content="#FFF5F7">
<title>4がつ20にち 音羽ちゃん専用</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sakura: #FFB7C5;
    --sakura-deep: #EC407A;
    --sakura-shadow: #F8BBD0;
    --leaf: #AED581;
    --leaf-deep: #7CB342;
    --leaf-shadow: #C5E1A5;
    --bg: #FFF5F7;
    --text: #4E342E;
    --cream: #FFFDE7;
    --sky: #B3E5FC;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(var(--sakura-shadow) 14%, transparent 15%),
      radial-gradient(var(--leaf-shadow) 14%, transparent 15%);
    background-size: 44px 44px;
    background-position: 0 0, 22px 22px;
    color: var(--text);
    margin: 0;
    padding: 12px 14px 40px;
    text-align: center;
    touch-action: manipulation;
  }
  ruby { ruby-align: center; }
  rt { font-size: 11px; color: #8D6E63; }

  .container {
    max-width: 600px;
    margin: 0 auto;
    background: rgba(255,255,255,0.96);
    padding: 22px 18px 28px;
    border-radius: 28px;
    border: 4px solid var(--sakura);
    box-shadow: 0 10px 24px rgba(236,64,122,0.18);
  }
  h1 {
    font-size: 22px;
    color: var(--sakura-deep);
    margin: 4px 0 2px;
    text-shadow: 2px 2px 0 var(--leaf-shadow);
  }
  .subtitle {
    font-size: 13px;
    color: var(--leaf-deep);
    margin-bottom: 10px;
    font-weight: 700;
  }
  .date-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--sakura), var(--leaf));
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 16px;
    margin-bottom: 8px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
  }

  .section-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 8px 0 14px;
  }
  .dot {
    width: 10px; height: 10px;
    background: #E0E0E0;
    border-radius: 50%;
    transition: all 0.3s;
  }
  .dot.active { background: var(--sakura-deep); transform: scale(1.3); }
  .dot.done { background: var(--leaf-deep); }

  .stage-label {
    font-size: 15px;
    font-weight: 700;
    color: var(--sakura-deep);
    margin: 2px 0 10px;
  }

  /* ══ フラッシュカード ══ */
  .flash-card {
    background: linear-gradient(135deg, #FFF8FB, #F1F8E9);
    border: 4px solid var(--sakura);
    border-radius: 26px;
    padding: 26px 18px;
    margin: 10px auto 14px;
    max-width: 460px;
    box-shadow: 0 7px 0 var(--sakura-shadow);
    min-height: 170px;
  }
  .flash-english {
    font-size: 44px;
    font-weight: 700;
    color: var(--sakura-deep);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .flash-ja {
    font-size: 22px;
    font-weight: 700;
    color: var(--leaf-deep);
    margin: 6px 0;
    display: none;
  }
  .flash-example {
    font-size: 16px;
    color: #6D4C41;
    font-style: italic;
    margin: 8px 0 4px;
    display: none;
    line-height: 1.5;
  }
  .flash-example-ja {
    font-size: 13px;
    color: #8D6E63;
    display: none;
  }
  .flash-tip {
    font-size: 13px;
    color: var(--leaf-deep);
    background: var(--cream);
    padding: 6px 12px;
    border-radius: 12px;
    display: none;
    margin-top: 10px;
    border: 2px dashed var(--leaf);
  }
  .flash-card.revealed .flash-ja,
  .flash-card.revealed .flash-example,
  .flash-card.revealed .flash-example-ja,
  .flash-card.revealed .flash-tip { display: block; }

  /* ══ ボタン類 ══ */
  .btn {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 17px;
    font-weight: 700;
    padding: 13px 22px;
    border: none;
    border-radius: 22px;
    color: #fff;
    cursor: pointer;
    transition: all 0.1s ease;
    margin: 4px;
  }
  .btn:active { transform: translateY(4px); box-shadow: none !important; }
  .btn-pink { background: var(--sakura-deep); box-shadow: 0 5px 0 #AD1457; }
  .btn-green { background: var(--leaf-deep); box-shadow: 0 5px 0 #558B2F; }
  .btn-sky { background: #29B6F6; box-shadow: 0 5px 0 #0288D1; }
  .btn:disabled { opacity: 0.4; cursor: default; }

  .btn-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

  /* ══ チャレンジ問題 ══ */
  .q-hint {
    background: var(--cream);
    padding: 10px 16px;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 700;
    color: #8D6E63;
    border: 2px dashed #FFD54F;
    display: inline-block;
    max-width: 90%;
    margin: 6px auto 12px;
  }
  .q-sentence {
    background: #FFF9C4;
    padding: 18px 20px;
    border-radius: 18px;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    border: 3px solid #FFE082;
    max-width: 92%;
    margin: 8px auto 14px;
    line-height: 1.5;
  }
  .q-blank {
    display: inline-block;
    min-width: 70px;
    border-bottom: 4px solid var(--sakura-deep);
    color: var(--sakura-deep);
    padding: 0 6px;
  }
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 460px;
    margin: 0 auto 10px;
  }
  .choice-btn {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 17px;
    font-weight: 700;
    padding: 14px 8px;
    border: 3px solid var(--sakura);
    border-radius: 14px;
    background: #FFF8FB;
    color: var(--sakura-deep);
    cursor: pointer;
    box-shadow: 0 5px 0 var(--sakura-shadow);
    transition: all 0.1s ease;
  }
  .choice-btn:active { transform: translateY(4px); box-shadow: none; }
  .choice-btn.correct { background: #DCEDC8; border-color: var(--leaf-deep); box-shadow: 0 5px 0 var(--leaf-deep); color: #33691E; }
  .choice-btn.wrong { background: #FFCDD2; border-color: #E57373; box-shadow: 0 5px 0 #C62828; color: #B71C1C; }
  .choice-btn:disabled { cursor: default; }
  .choice-meaning { display: block; font-size: 11px; color: #757575; margin-top: 3px; font-weight: 500; }
  .choice-btn.correct .choice-meaning { color: #33691E; }
  .choice-btn.wrong .choice-meaning { color: #B71C1C; }

  .q-message { font-size: 20px; font-weight: 700; margin: 10px 0; min-height: 30px; }
  .explain-box {
    background: var(--cream);
    border: 2px solid #FFD54F;
    border-radius: 14px;
    padding: 10px 14px;
    margin: 6px auto 10px;
    max-width: 92%;
    font-size: 14px;
    color: #6D4C41;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .explain-box.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .q-score { font-size: 13px; color: #9E9E9E; margin-bottom: 6px; }

  /* ══ 会話文用 ══ */
  .conv-box {
    background: #E3F2FD;
    border: 3px solid #90CAF9;
    border-radius: 18px;
    padding: 14px 16px;
    margin: 8px auto 12px;
    max-width: 92%;
    text-align: left;
    font-size: 16px;
    line-height: 1.8;
  }
  .conv-box .speaker {
    font-weight: 700;
    color: #1565C0;
    margin-right: 6px;
  }
  .conv-box .speaker-b {
    color: #AD1457;
  }
  .conv-ja {
    font-size: 13px;
    color: #757575;
    margin-top: 4px;
    display: block;
  }

  /* ══ ごほうび画面 ══ */
  .reward {
    padding: 20px 10px;
    animation: fadeIn 0.6s ease;
  }
  .reward h2 {
    font-size: 28px;
    color: var(--sakura-deep);
    margin: 8px 0;
    text-shadow: 2px 2px 0 var(--leaf-shadow);
  }
  .reward .big-score {
    font-size: 54px;
    font-weight: 700;
    color: var(--leaf-deep);
    margin: 14px 0;
    text-shadow: 3px 3px 0 #FFF9C4;
  }
  .reward .stars {
    font-size: 40px;
    margin: 10px 0;
    letter-spacing: 4px;
  }
  .reward p {
    font-size: 16px;
    color: var(--text);
    margin: 10px auto;
    max-width: 420px;
    line-height: 1.7;
  }
  .confetti-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .confetti {
    position: absolute;
    width: 10px; height: 10px;
    top: -10px;
    animation: fall 3s ease-in forwards;
  }
  @keyframes fall { to { top: 110vh; transform: rotate(720deg); } }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <div class="date-badge">🌸 4<ruby>月<rt>がつ</rt></ruby>20<ruby>日<rt>にち</rt></ruby>（<ruby>月<rt>げつ</rt></ruby>） 🌱</div>
  <h1>きょうの<ruby>音羽<rt>おとわ</rt></ruby>ちゃんスペシャル</h1>
  <div class="subtitle">きょうのテーマは「<ruby>疑問詞<rt>ぎもんし</rt></ruby>ファイブ！」 who / what / where / when / how</div>

  <div class="section-dots">

  <!-- ═══ ステージ1：フラッシュカード ═══ -->
  <div id="stage-flash">
    <div class="stage-label">🌟 ステージ1：きょうの<ruby>単語<rt>たんご</rt></ruby>フラッシュ</div>
    <div class="q-score" id="flash-progress">1 / 5</div>

    </div>

      <button class="btn btn-sky" onclick="speakFlash()">🔊 <ruby>発音<rt>はつおん</rt></ruby></button>
      <button class="btn btn-pink" id="flash-reveal-btn" onclick="revealFlash()">👀 <ruby>答<rt>こた</rt></ruby>えを<ruby>見<rt>み</rt></ruby>る</button>
      <button class="btn btn-green hidden" id="flash-next-btn" onclick="nextFlash()">つぎへ →</button>

  <!-- ═══ ステージ2：大問1 チャレンジ ═══ -->
  <div id="stage-challenge" class="hidden">

    </div>

  <!-- ═══ ステージ3：大問2 会話文 ═══ -->
  <div id="stage-conv" class="hidden">
    <div class="stage-label">💬 ステージ3：<ruby>大問<rt>だいもん</rt></ruby>2（<ruby>会話文<rt>かいわぶん</rt></ruby>）</div>

  </div>

  <!-- ═══ ステージ4：ごほうび ═══ -->
  <div id="stage-reward" class="hidden reward">

    <div class="stars" id="reward-stars"></div>

      <a class="btn btn-green" href="collection.html" style="text-decoration:none; display:inline-block;">🗂️ <ruby>単語<rt>たんご</rt></ruby>ずかんを<ruby>見<rt>み</rt></ruby>る</a>

    <!-- 保護者むけ：ログ出力 -->
    <details style="margin-top:28px; text-align:left; max-width:500px; margin-left:auto; margin-right:auto;">
      <summary style="cursor:pointer; font-size:13px; color:#888; padding:8px;">📊 ほごしゃむけ：<ruby>学習<rt>がくしゅう</rt></ruby>ログ</summary>
      <div style="padding:10px; background:#F5F5F5; border-radius:12px; margin-top:8px;">
        <div style="text-align:center; margin-bottom:10px;">
          <button class="btn btn-sky" style="font-size:14px; padding:8px 16px;" onclick="copyLog()">📋 コピー</button>
          <button class="btn btn-green" style="font-size:14px; padding:8px 16px;" onclick="downloadLog()">⬇️ ダウンロード</button>

<script>
// ═══════════════════════════════════════
//  単語ずかん ヘルパー（共通）
// ═══════════════════════════════════════
window.otowaCollection = (function() {
  const KEY = 'otowa_word_collection';
  function load() { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { return {}; } }
  function save(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e) {} }
  function norm(en) { return String(en || '').trim().toLowerCase(); }
  function today() { return new Date().toISOString().slice(0, 10); }
  return {
    addWord(en, meta) {
      if (!en) return;
      const data = load();
      const key = norm(en);
      if (!data[key]) {
        data[key] = {
          en: String(en).trim(),
          ja: (meta && meta.ja) || '',
          ex: (meta && meta.ex) || '',
          exJa: (meta && meta.exJa) || '',
          learned_at: today(),
          mastery: 0,
          perfectDays: []
        };
      } else {
        if (meta && meta.ja && !data[key].ja) data[key].ja = meta.ja;
        if (meta && meta.ex && !data[key].ex) data[key].ex = meta.ex;
        if (meta && meta.exJa && !data[key].exJa) data[key].exJa = meta.exJa;
      }
      save(data);
    },
    incMastery(en) {
      if (!en) return;
      const data = load();
      const key = norm(en);
      if (!data[key]) {
        data[key] = { en: String(en).trim(), ja: '', ex: '', exJa: '', learned_at: today(), mastery: 0, perfectDays: [] };
      }
      data[key].mastery = (data[key].mastery || 0) + 1;
      save(data);
    },
    markPerfectDay(words, date) {
      if (!Array.isArray(words)) return;
      const d = date || today();
      const data = load();
      words.forEach(en => {
        const key = norm(en);
        if (!data[key]) return;
        data[key].perfectDays = data[key].perfectDays || [];
        if (!data[key].perfectDays.includes(d)) data[key].perfectDays.push(d);
      });
      save(data);
    },
    count() { return Object.keys(load()).length; }
  };
})();

// ═══════════════════════════════════════
//  データ：きょうの5単語（疑問詞ファイブ）＋大問1の3問＋大問2の2問
// ═══════════════════════════════════════
const flashCards = [
  {
    en: 'who',
    ja: 'だれ',
    ex: 'Who is that boy?',
    exJa: 'あの 男の子は だれ？',
    tip: '「だれ？」と きくときは Who！ 人を きくことば。'
  },
  {
    en: 'what',
    ja: 'なに',
    ex: 'What is this?',
    exJa: 'これは なに？',
    tip: '「なに？」と きくときは What！ ものや ことを きくことば。'
  },
  {
    en: 'where',
    ja: 'どこ',
    ex: 'Where is my bag?',
    exJa: 'わたしの かばんは どこ？',
    tip: '「どこ？」と きくときは Where！ ばしょを きくことば。'
  },
  {
    en: 'when',
    ja: 'いつ',
    ex: 'When is your birthday?',
    exJa: 'あなたの たんじょうびは いつ？',
    tip: '「いつ？」と きくときは When！ 時間や 日づけを きくことば。'
  },
  {
    en: 'how',
    ja: 'どう・どうやって',
    ex: 'How are you?',
    exJa: 'げんき？（どんな ちょうし？）',
    tip: '「どう？」と きくときは How！ げんき？の あいさつ「How are you?」でも つかうよ。'
  }
];

// ═══ 大問1：疑問詞メイン＋三単現の復習 ═══
const challenges = [
  {
    sentence: '( ) is this?',
    hint: 'これは なに？',
    choices: ['What', 'Who', 'Where', 'How'],
    meanings: { What: 'なに', Who: 'だれ', Where: 'どこ', How: 'どう' },
    answer: 'What',
    explanation: '「これは ＿＿？」で「もの」を きいているから What（なに）！ 人をきくのは Who、ばしょは Where だよ。'
  },
  {
    sentence: 'A: ( ) are you? B: I\'m fine, thank you.',
    hint: 'A: げんき？ B: うん、げんきだよ、ありがとう。',
    choices: ['How', 'What', 'When', 'Who'],
    meanings: { How: 'どう', What: 'なに', When: 'いつ', Who: 'だれ' },
    answer: 'How',
    explanation: '「How are you?」は「げんき？どんな ちょうし？」と きく おきまりフレーズ。How は「どう？」をきく ことばだよ。'
  },
  {
    sentence: 'Ken ( ) to school by bus.',
    hint: 'ケンは バスで がっこうへ いく。',
    choices: ['goes', 'go', 'going', 'came'],
    meanings: { goes: 'いく(s)', go: 'いく', going: 'いっている', came: 'きた（むかし）' },
    answer: 'goes',
    explanation: 'Ken は he のなかま（1人）だから go に es がついて goes！ o でおわる動詞は es が つくよ。'
  }
];

// ═══ 大問2：会話文（疑問詞への返答）═══
const conversations = [
  {
    a: 'Where are you from?',
    aJa: 'どこから きたの？',
    b: '( ).',
    hint: 'Where（どこ？）と きかれたら、どう こたえる？',
    choices: ["I'm from Japan", "I'm fine, thank you", "It's Monday", 'Good night'],
    meanings: {
      "I'm from Japan": 'わたしは 日本から きました',
      "I'm fine, thank you": 'げんきだよ、ありがとう',
      "It's Monday": '月曜日だよ',
      'Good night': 'おやすみ'
    },
    answer: "I'm from Japan",
    explanation: 'Where are you from? は「どこから きたの？」と 出身地（しゅっしんち）を きく ひょうげん。こたえは from 〜（〜から）！'
  },
  {
    a: 'When is your birthday?',
    aJa: 'たんじょうびは いつ？',
    b: '( ).',
    hint: 'When（いつ？）と きかれたら、どう こたえる？',
    choices: ["It's May 27th", "I'm fine", 'My name is Ken', 'See you'],
    meanings: {
      "It's May 27th": '5月27日だよ',
      "I'm fine": 'げんきだよ',
      'My name is Ken': 'わたしの なまえは ケン',
      'See you': 'またね'
    },

// ═══════════════════════════════════════
//  音声読み上げ
// ═══════════════════════════════════════
let bestVoice = null;
let voiceA = null;
function initVoice() {
  if (!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  const en = voices.filter(v => v.lang && v.lang.startsWith('en'));
  const preferB = ['Samantha', 'Karen', 'Moira', 'Serena', 'Google US English'];
  for (const name of preferB) {
    const v = en.find(v => v.name === name);
    if (v) { bestVoice = v; break; }
  }
  if (!bestVoice) bestVoice = en[0] || null;
  const preferA = ['Alex', 'Daniel', 'Fred', 'Tom', 'Aaron'];
  for (const name of preferA) {
    const v = en.find(v => v.name === name);
    if (v) { voiceA = v; break; }
  }
  if (!voiceA) {
    voiceA = en.find(v => v !== bestVoice) || bestVoice;
  }
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = initVoice;
  initVoice();
}
function speak(text, voice) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const cleaned = String(text).replace(/\b[AB]:\s*/g, '');
  const utt = new SpeechSynthesisUtterance(cleaned);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  const chosen = voice || bestVoice;
  if (chosen) utt.voice = chosen;
  utt.pitch = chosen === voiceA ? 0.95 : 1.1;
  speechSynthesis.speak(utt);
}

let flashIdx = 0;

function loadFlash() {
  const card = flashCards[flashIdx];
  document.getElementById('flash-en').textContent = card.en;
  document.getElementById('flash-ja').textContent = card.ja;
  document.getElementById('flash-ex').textContent = card.ex;
  document.getElementById('flash-ex-ja').textContent = card.exJa;
  document.getElementById('flash-tip').textContent = '💡 ' + card.tip;
  document.getElementById('flash-card').classList.remove('revealed');

  otowaCollection.addWord(card.en, { ja: card.ja, ex: card.ex, exJa: card.exJa });
}

function speakFlash() {

// ═══════════════════════════════════════
//  ステージ2：大問1 チャレンジ
// ═══════════════════════════════════════
let chIdx = 0;
let chScore = 0;
let chWaiting = false;

function goToChallenge() {
  document.getElementById('stage-flash').classList.add('hidden');
  document.getElementById('stage-challenge').classList.remove('hidden');
  document.getElementById('dot-flash').classList.remove('active');
  document.getElementById('dot-flash').classList.add('done');
  document.getElementById('dot-challenge').classList.add('active');
  loadChallenge();
}

function loadChallenge() {
  const q = challenges[chIdx];
  const sentenceHtml = q.sentence.replace('( )', '<span class="q-blank">　　　</span>');
  document.getElementById('ch-sentence').innerHTML = sentenceHtml;
  document.getElementById('ch-hint').textContent = q.hint;
  document.getElementById('ch-message').textContent = '';
  document.getElementById('ch-message').style.color = '';
  document.getElementById('ch-explain').classList.remove('show');
  document.getElementById('ch-next-btn').classList.add('hidden');
  document.getElementById('ch-replay-btn').classList.add('hidden');
  document.getElementById('ch-progress').textContent =
    (chIdx + 1) + ' / ' + challenges.length + '　せいかい：' + chScore;

  const choicesEl = document.getElementById('ch-choices');
  choicesEl.innerHTML = '';
  q.choices.forEach(word => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = word;
    btn.onclick = () => selectChoice(btn, word);
    choicesEl.appendChild(btn);
  });
  chWaiting = false;
}

function revealAllMeanings(q) {
  document.querySelectorAll('#ch-choices .choice-btn').forEach(b => {
    const word = b.childNodes[0].nodeValue || b.textContent;
    if (q.meanings[word] && !b.querySelector('.choice-meaning')) {
      const span = document.createElement('span');
      span.className = 'choice-meaning';
      span.textContent = q.meanings[word];
      b.appendChild(span);
    }
  });
  const exp = document.getElementById('ch-explain');
  exp.innerHTML = '💡 ' + q.explanation;
  exp.classList.add('show');
}

function selectChoice(btn, word) {
  if (chWaiting) {
    if (word === challenges[chIdx].answer) {
      btn.classList.remove('wrong');
      btn.classList.add('correct');
      document.getElementById('ch-message').textContent = '🌟 そう、これが せいかい！';
      document.getElementById('ch-message').style.color = '#558B2F';
      document.getElementById('ch-next-btn').classList.remove('hidden');
      chWaiting = false;
      speakFullSentence();
    }
    return;
  }
  const q = challenges[chIdx];
  const correct = word === q.answer;
  const msg = document.getElementById('ch-message');

  if (correct) {
    chScore++;
    // ずかんのマスタリー加算（一発正解のみ）
    otowaCollection.incMastery(q.answer);
    document.querySelectorAll('#ch-choices .choice-btn').forEach(b => {
      b.disabled = true;
      if (b.textContent === q.answer) b.classList.add('correct');
    });
    msg.textContent = '🎉 せいかい！すごい！';
    msg.style.color = '#558B2F';
    revealAllMeanings(q);
    document.getElementById('ch-next-btn').classList.remove('hidden');
    document.getElementById('ch-replay-btn').classList.remove('hidden');
    speakFullSentence();
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('#ch-choices .choice-btn').forEach(b => {
      if (b.textContent === q.answer) {
        b.classList.add('correct');
      } else if (b.textContent !== word) {
        b.disabled = true;
      }
    });
    btn.disabled = true;
    msg.textContent = '😢 ざんねん… せいかいをタップしてね！';
    msg.style.color = '#C62828';
    revealAllMeanings(q);
    document.getElementById('ch-replay-btn').classList.remove('hidden');
    chWaiting = true;
  }
}

function speakFullSentence() {
  const q = challenges[chIdx];
  const full = q.sentence.replace('( )', q.answer);
  setTimeout(() => speak(full), 300);
}

function replayChallenge() {
  speakFullSentence();
}

function nextChallenge() {
  chIdx++;
  if (chIdx >= challenges.length) {
    goToConv();
  } else {
    loadChallenge();
  }
}

// ═══════════════════════════════════════

let cvIdx = 0;
let cvScore = 0;
let cvWaiting = false;

function goToConv() {

  document.getElementById('stage-conv').classList.remove('hidden');

function revealConvMeanings(q) {

function selectConv(btn, phrase) {
  if (cvWaiting) {
    if (phrase === conversations[cvIdx].answer) {
      btn.classList.remove('wrong');
      btn.classList.add('correct');
      document.getElementById('cv-message').textContent = '🌟 そう、これが せいかい！';
      document.getElementById('cv-message').style.color = '#558B2F';
      document.getElementById('cv-next-btn').classList.remove('hidden');

  const q = conversations[cvIdx];

  if (correct) {

    document.querySelectorAll('#cv-choices .choice-btn').forEach(b => {
      b.disabled = true;
      if (b.textContent === q.answer) b.classList.add('correct');
    });

    msg.style.color = '#558B2F';

    document.getElementById('cv-replay-btn').classList.remove('hidden');
    speakConvAnswer();
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('#cv-choices .choice-btn').forEach(b => {
      if (b.textContent === q.answer) {
        b.classList.add('correct');
      } else if (b.textContent !== phrase) {
        b.disabled = true;
      }
    });
    btn.disabled = true;
    msg.textContent = '😢 ざんねん… せいかいをタップしてね！';
    msg.style.color = '#C62828';
    revealConvMeanings(q);
    document.getElementById('cv-replay-btn').classList.remove('hidden');
    cvWaiting = true;

function speakConvAnswer() {
  const q = conversations[cvIdx];
  const bFull = q.b.replace('( )', q.answer);
  setTimeout(() => speak(q.a, voiceA), 200);
  setTimeout(() => speak(bFull, bestVoice), 1800);
}

function replayConv() {
  speakConvAnswer();
}

function nextConv() {
  cvIdx++;
  if (cvIdx >= conversations.length) {
    goToReward();
  } else {
    loadConv();
  }
}

function goToReward() {
  document.getElementById('stage-conv').classList.add('hidden');
  document.getElementById('stage-reward').classList.remove('hidden');
  document.getElementById('dot-conv').classList.remove('active');
  document.getElementById('dot-conv').classList.add('done');
  document.getElementById('dot-reward').classList.add('active');

  const totalCh = challenges.length;
  const totalCv = conversations.length;
  const total = totalCh + totalCv;
  const score = chScore + cvScore;
  document.getElementById('reward-score').textContent = score + ' / ' + total + ' せいかい！';

  let stars = '';
  for (let i = 0; i < total; i++) stars += i < score ? '⭐' : '☆';
  document.getElementById('reward-stars').textContent = stars;

  const rate = score / total;
  let msg;
  if (rate === 1) msg = 'パーフェクト！！かんぺき！きょうのもんだいは もう だいじょうぶだね 🌸';
  else if (rate >= 0.85) msg = 'すごい！ほとんど せいかい！音羽ちゃんの ちから、のびてるね。';
  else if (rate >= 0.7) msg = 'すばらしい！むずかしい もんだいを よくがんばったね。';
  else if (rate >= 0.5) msg = 'よくできたね！まちがえた ところは また あしたやろう。';
  else msg = 'まいにち つづけたら ぜったい のびるよ！';
  document.getElementById('reward-msg').textContent = msg;

  // ログ保存
  try {
    const log = {
      date: '2026-04-20',
      flashCards: flashCards.map(c => c.en),
      challengeScore: chScore,
      challengeTotal: totalCh,
      conversationScore: cvScore,
      conversationTotal: totalCv,
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('otowa_daily_2026-04-20', JSON.stringify(log));
  } catch (e) {}

  // 満点なら今日のフラッシュ単語に 🏆 スタンプ
  if (score === total && total > 0) {
    try { otowaCollection.markPerfectDay(flashCards.map(c => c.en), '2026-04-20'); } catch (e) {}
  }

  populateLogTextarea();
  launchConfetti();
}

// ═══════════════════════════════════════
//  ログ出力（保護者向け）
// ═══════════════════════════════════════
function collectAllLogs() {
  const logs = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('otowa_daily_')) {
      try {
        logs.push(JSON.parse(localStorage.getItem(key)));
      } catch (e) {}
    }
  }
  logs.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  return logs;
}

function populateLogTextarea() {
  const logs = collectAllLogs();
  document.getElementById('log-textarea').value = JSON.stringify(logs, null, 2);
}

function copyLog() {
  const ta = document.getElementById('log-textarea');
  const result = document.getElementById('copy-result');
  ta.select();
  ta.setSelectionRange(0, ta.value.length);
  const text = ta.value;
  const done = () => { result.textContent = '✅ コピーしたよ！'; setTimeout(() => result.textContent = '', 2500); };
  const fail = () => { result.textContent = '⚠️ コピーできなかった…テキストをタップして手動コピーしてね'; };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => {
      try { document.execCommand('copy'); done(); } catch (e) { fail(); }
    });
  } else {
    try { document.execCommand('copy'); done(); } catch (e) { fail(); }
  }
}

function downloadLog() {
  const text = document.getElementById('log-textarea').value;
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'eiken5-log-2026-04-20.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  const result = document.getElementById('copy-result');
  result.textContent = '✅ ダウンロードしたよ！';
  setTimeout(() => result.textContent = '', 2500);
}

function launchConfetti() {
  const layer = document.createElement('div');
  layer.className = 'confetti-layer';
  document.body.appendChild(layer);
  const colors = ['#FFB7C5', '#AED581', '#FFD54F', '#B3E5FC', '#F06292', '#7CB342'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = (Math.random() * 1.5) + 's';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    layer.appendChild(c);
  }
  setTimeout(() => layer.remove(), 5500);
}
